<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Magic Board</title>
    <meta
      name="description"
      content="Magic Board is a realtime grid-claiming game. Claim cells, compete on the leaderboard, and customize your profile."
    />

    <!-- Theme / UI -->
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0b0b0b" />

    <!-- Favicon / App icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Optional (only if you add these files under /public):
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    -->

    <!-- Open Graph (social preview) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Magic Board" />
    <meta
      property="og:description"
      content="Claim cells, compete on the leaderboard, and customize your profile."
    />
    <!-- Set this when you know your deployed URL -->
    <!-- <meta property="og:url" content="https://your-domain.com/" /> -->
    <!-- Add an image in /public and set the path here -->
    <!-- <meta property="og:image" content="/og.png" /> -->

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Magic Board" />
    <meta
      name="twitter:description"
      content="Claim cells, compete on the leaderboard, and customize your profile."
    />
    <!-- <meta name="twitter:image" content="/og.png" /> -->

    <div id="root"></div>
